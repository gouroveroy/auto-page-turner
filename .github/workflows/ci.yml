name: Auto Page Turner CI

# 1. THE TRIGGER: When should this pipeline run?
on:
  push:
    branches: [ "main" ] # Runs every time you push to the 'main' branch

# 2. THE WORK: What exactly should happen?
jobs:
  test-the-code:
    # 3. THE ENVIRONMENT: What operating system should the GitHub server use?
    runs-on: ubuntu-latest

    # 4. THE STEPS: The checklist for the server to follow
    steps:
    # Step A: Download your project files onto the GitHub server
    - name: Grab the code
      uses: actions/checkout@v4

    # Step B: Install Python on the server
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Specify your Python version

    # Step C: Install your project's dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step D: Check for basic syntax errors (Linting)
    - name: Run a basic syntax check using Flake8
      run: |
        pip install flake8
        # This command tells Flake8 to find critical Python errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics